spring.application.name=turnover
server.port=8081
prediction.service.url=http://127.0.0.1:8001/predict

# ===================== DATABASE (MySQL) =====================
# Par défaut, cette application est configurée pour H2 en mémoire.
# Si vous voulez que les données soient persistées via MySQL/phpMyAdmin,
# décommentez ces lignes et commentez les blocs H2 ci-dessous.
spring.datasource.url=jdbc:mysql://localhost:3306/turnover_db?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT configuration
jwt.secret=ChangeThisToAStrongSecretKeyThatIsAtLeast64CharactersLongForHS512
jwt.expiration-ms=86400000

# ===================== DATABASE (H2 In-Memory) =====================
# NOTE: H2 en mémoire crée une base temporaire qui n'est pas visible dans phpMyAdmin.
# Les données existent uniquement pendant l'exécution de l'application.
# spring.datasource.url=jdbc:h2:mem:turnover_db;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
